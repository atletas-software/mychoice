name: Deploy My Choice to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-my-choice
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate app files
        run: |
          node --check server.js
          node --check app.js
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"

      - name: Configure SSH
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HOSTINGER_SSH_KEY" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          ssh-keyscan -p "${HOSTINGER_SSH_PORT:-22}" "$HOSTINGER_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload app to Hostinger
        env:
          HOSTINGER_DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          rsync -az --delete \
            --exclude ".env" \
            --exclude "data/" \
            --exclude "node_modules/" \
            --exclude ".git/" \
            -e "ssh -i ~/.ssh/hostinger_key -p ${HOSTINGER_SSH_PORT:-22}" \
            ./ \
            "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST:$HOSTINGER_DEPLOY_PATH/"

      - name: Install and restart app
        env:
          HOSTINGER_DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          HOSTINGER_RESTART_COMMAND: ${{ secrets.HOSTINGER_RESTART_COMMAND }}
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          ssh -i ~/.ssh/hostinger_key -p "${HOSTINGER_SSH_PORT:-22}" "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST" << EOF
            set -e
            cd "$HOSTINGER_DEPLOY_PATH"
            npm install --omit=dev
            if [ -n "$HOSTINGER_RESTART_COMMAND" ]; then
              $HOSTINGER_RESTART_COMMAND
            else
              echo "No HOSTINGER_RESTART_COMMAND configured. Restart the Node.js app in hPanel if needed."
            fi
          EOF
